name: Build and Push Scheduler Service

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  TARGET_PLATFORMS: linux/arm64
  REGISTRY: docker.io
  IMAGE_NAME: petretiandrea/scheduler-service

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push Docker image
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'scheduler-service-v')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(jq -r '."scheduler"' .release-please-manifest.json)
          else
            TAG_NAME="${{ github.event.release.tag_name }}"
            if [[ "$TAG_NAME" =~ scheduler-service-v(.*) ]]; then
              VERSION="${BASH_REMATCH[1]}"
            else
              echo "Error: Tag name doesn't match expected pattern scheduler-service-v*"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          check-latest: true
          cache-dependency-path: scheduler/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./scheduler
          file: ./scheduler/Dockerfile
          push: true
          platforms: ${{ env.TARGET_PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
