namespace: "beaesthetic"
name: "scheduler-service"
labels:
  app: "scheduler-service"

replicaCount: 1

image:
  repository: petretiandrea/scheduler-service
  pullPolicy: IfNotPresent

service:
  create: true
  type: ClusterIP
  ports:
    - 8080

envConfig:
  SERVER_PORT: "8080"
  OTEL_COLLECTOR_GRPC_ENDPOINT: "http://opentelemetry-collector.monitoring.svc.cluster.local:4317"
  RABBIT_HOST: "rabbitmq-v2.common.svc.cluster.local"
  RABBIT_PORT: "5672"
  RABBIT_USERNAME: "beaesthetic"
  RABBIT_EXCHANGE: ""

  REDIS_HOST: "redis-headless.common.svc.cluster.local"
  REDIS_PORT: "6379"

  SCHEDULER_NAME: "reminders"
  SCHEDULER_POLLING_INTERVAL: "60s"
  SCHEDULER_PEEK_LEASE_TTL: "30s"
  SCHEDULER_PEEK_BATCH_SIZE: "50"

resources:
  requests:
    memory: "100Mi"
    cpu: "80m"
  limits:
    memory: "100Mi"
    cpu: "80m"

secretKeyRef:
  - name: POSTGRES_DSN
    secretRefName: scheduler-secrets
    key: postgres-dsn
  - name: RABBIT_PASSWORD
    secretRefName: scheduler-secrets
    key: rabbitmq-password
  - name: REDIS_PASSWORD
    secretRefName: scheduler-service
    key: REDIS_PASSWORD

initContainers:
  migrate:
    enabled: true
    command:
      - /app/scheduler
      - migrate

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 30
  failureThreshold: 10
  periodSeconds: 30

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  failureThreshold: 10
  periodSeconds: 30
